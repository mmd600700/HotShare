<!DOCTYPE html>
<html lang="fa">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{
box-sizing:border-box;
font-family:system-ui;
}
body{
margin:0;
background:#0f1115;
color:#fff;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}
a{
background:#1e2430;
width:100%;
max-width:500px;
text-align:center;
padding:22px;
border-radius:18px;
font-size:22px;
font-weight:700;
margin-bottom:30px;
}
input{
width:100%;
max-width:500px;
padding:18px;
border-radius:16px;
border:2px solid #2a3140;
background:#151922;
color:#fff;
font-size:18px;
margin-bottom:20px;
}
button{
width:100%;
max-width:500px;
padding:20px;
border-radius:16px;
border:none;
background:linear-gradient(135deg,#4f7cff,#7a5cff);
color:#fff;
font-size:20px;
font-weight:700;
margin-bottom:25px;
}
ul{
list-style:none;
padding:0;
margin:0;
width:100%;
max-width:500px;
}
li{
background:#161b25;
padding:16px;
border-radius:14px;
font-size:15px;
margin-bottom:14px;
}
.name{
margin-bottom:10px;
word-break:break-all;
}
.bar{
width:100%;
height:10px;
background:#222837;
border-radius:10px;
overflow:hidden;
}
.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#4f7cff,#7a5cff);
transition:width .2s;
}
.done{
background:linear-gradient(90deg,#22c55e,#16a34a);
}
</style>
</head>
<body>
<a href="/downloadss">Download Files</a>
<input type="file" id="file" multiple>
<button onclick="upload()">Upload</button>

<ul id="uploadList"></ul>

<script>
function upload(){
var files=document.getElementById("file").files;
if(!files.length){alert("no file");return;}
var list=document.getElementById("uploadList");
list.innerHTML="";

var bars=[];
for(var i=0;i<files.length;i++){
var li=document.createElement("li");
var name=document.createElement("div");
name.className="name";
name.textContent="0% - "+files[i].name;
var bar=document.createElement("div");
bar.className="bar";
var fill=document.createElement("div");
fill.className="fill";

bar.appendChild(fill);
li.appendChild(name);
li.appendChild(bar);
list.appendChild(li);
bars.push({name:name,fill:fill});
}
var index=0;
function sendNext(){
if(index>=files.length){alert("done");return;}
var file=files[index];
var xhr=new XMLHttpRequest();
xhr.open("POST","/upload");
xhr.setRequestHeader("X-File-Name",encodeURIComponent(file.name));
xhr.setRequestHeader("X-File-Size",file.size);
xhr.setRequestHeader("X-File-Index",(index +1)+"/"+files.length);
xhr.upload.onprogress=function(e){
if(e.lengthComputable){
var percent=Math.floor((e.loaded/e.total)*100);
bars[index].name.textContent=percent+"% - "+file.name;
bars[index].fill.style.width=percent+"%";
}
};
xhr.onload=function(){
if(xhr.status===200){
bars[index].name.textContent="100% - "+file.name+" [OK]";
bars[index].fill.style.width="100%";
bars[index].fill.classList.add("done");
index++;
sendNext();
}else{
alert("err");
}
};
xhr.send(file);
}
sendNext();
}
</script>
</body>
</html>
